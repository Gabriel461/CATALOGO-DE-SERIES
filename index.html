<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP DE SÉRIES</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
    <h1 class="text-center mt-4 text-white">Catálogo de Séries</h1>

    <input type="text" id="serie" placeholder="Digite uma série" class="  form-control w-50 mx-auto mt-4">

    <button onclick="buscarSerie()" class="btn btn-primary mt-4">
        Buscar
    </button>

    <div id="resultado" class="mt-4"></div>

<script>
    async function buscarSerie(){
    const nomeSerie = document.getElementById("serie").value;
    const resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

try{
    const resposta = await fetch(`https://api.tvmaze.com/search/shows?q=${nomeSerie}`);

    const dados = await resposta.json();

if(dados.length === 0){
    resultado.innerHTML = `<p>Nenhuma série.</p>`;
    return;
}

for(let i = 0; i < dados.length; i++){

    const serie = dados[i].show;
    const card = document.createElement("div");
    card.classList.add("card");
    card.innerHTML = `<img src="${serie.image? serie.image.medium
: 'https://via.placeholder.com/200'
}">
    <h2>${serie.name}</h2>
<p>Nota: ${serie.rating.average? serie.rating.average: "Sem nota"}</p>`;
    resultado.appendChild(card);
}
} 
    catch(erro){
        resultado.innerHTML = `<p>Erro ao buscar séries.</p>`;
        console.log(erro);
}
}
</script>
</body>
</html>
